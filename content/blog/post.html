<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Post — Sebastian Franjou</title>
    <meta id="meta-description" name="description" content="Blog post by Sebastian Franjou" />
    <link rel="stylesheet" href="../css/index.css" />
    <link rel="stylesheet" href="../css/blog.css" />
    <script src="../js/components/inline-footnote.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      /* Ensure images loaded via markdown are responsive */
      .blog-post img {
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="../blog.html" class="blog-back-link">← Back to blog</a>

      <article class="blog-post" id="post-container">
        <h1 id="post-title" class="loading-text">Loading post...</h1>
        <p id="post-summary" class="blog-post-summary"></p>
        <div id="post-meta" class="blog-post-meta"></div>
        <div id="post-body"></div>
      </article>

      <!-- Comments Section -->
      <div id="comments-section" data-post-slug=""></div>
      
      <script src="../js/post.js" type="module"></script>
    </div>
  </body>
</html>
